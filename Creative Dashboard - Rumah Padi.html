<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative Dashboard — Rumah Padi Anak Yatim Budun</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f4f1;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.09);
    --text: #0b0b0b;
    --muted: #7a7975;
    --green: #1baf7a; --green-bg: #E1F5EE; --green-text: #0F6E56;
    --amber: #eda100; --amber-bg: #FAEEDA; --amber-text: #854F0B;
    --red: #e24b4a;   --red-bg: #FCEBEB;   --red-text: #A32D2D;
    --gray-bg: #F1EFE8; --gray-text: #5F5E5A;
    --radius: 12px;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; line-height: 1.5; padding: 24px; }

  /* Header */
  .header { margin-bottom: 24px; }
  .header h1 { font-size: 20px; font-weight: 600; margin-bottom: 2px; }
  .header p { color: var(--muted); font-size: 13px; }

  /* Summary bar */
  .summary { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 24px; }
  .stat { background: var(--surface); border-radius: 10px; padding: 12px 14px; border: 1px solid var(--border); }
  .stat-label { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
  .stat-val { font-size: 20px; font-weight: 600; }
  .stat-val.bad { color: var(--red); }
  .stat-val.good { color: var(--green); }

  /* Controls */
  .controls { display: flex; gap: 8px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
  .controls label { font-size: 12px; color: var(--muted); }
  .btn-group { display: flex; gap: 4px; }
  .sort-btn { padding: 5px 12px; font-size: 12px; border: 1px solid var(--border); border-radius: 20px; background: var(--surface); cursor: pointer; color: var(--muted); transition: all .15s; }
  .sort-btn.active { background: var(--text); color: #fff; border-color: var(--text); }
  .filter-btn { padding: 5px 12px; font-size: 12px; border: 1px solid var(--border); border-radius: 20px; background: var(--surface); cursor: pointer; color: var(--muted); transition: all .15s; }
  .filter-btn.active { border-color: var(--text); color: var(--text); font-weight: 500; }

  /* Grid */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }

  /* Card */
  .card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; transition: transform .15s, box-shadow .15s; }
  .card:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,0,0,.08); }
  .card.hidden { display: none; }

  /* Video container — 9:16 */
  .video-wrap { position: relative; width: 100%; padding-top: 177.78%; background: #1a1a18; overflow: hidden; }
  .video-wrap video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .video-placeholder { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; color: #555; }
  .video-placeholder svg { opacity: .3; }
  .video-placeholder span { font-size: 11px; opacity: .5; }

  /* Badge overlay */
  .badge-overlay { position: absolute; top: 8px; left: 8px; }
  .badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; letter-spacing: .03em; }
  .badge.winner { background: var(--green-bg); color: var(--green-text); }
  .badge.lemah  { background: var(--amber-bg); color: var(--amber-text); }
  .badge.rugi   { background: var(--red-bg);   color: var(--red-text); }
  .badge.zero   { background: var(--gray-bg);  color: var(--gray-text); }

  /* Spend overlay */
  .spend-overlay { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,.55); color: #fff; font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 20px; backdrop-filter: blur(4px); }

  /* Card body */
  .card-body { padding: 12px 14px; }
  .card-title { font-size: 13px; font-weight: 600; margin-bottom: 1px; }
  .card-subtitle { font-size: 11px; color: var(--muted); margin-bottom: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Metric rows */
  .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 12px; }
  .metric-item { }
  .metric-item .m-label { font-size: 10px; color: var(--muted); margin-bottom: 1px; }
  .metric-item .m-val { font-size: 13px; font-weight: 600; }

  /* Mini bar */
  .bar-track { height: 4px; background: #ece9e3; border-radius: 2px; margin-top: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 2px; }

  /* ROAS big */
  .roas-row { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .roas-label { font-size: 10px; color: var(--muted); }
  .roas-val { font-size: 16px; font-weight: 700; }

  /* Section for hooks */
  .section-heading { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin: 32px 0 12px; }

  @media (max-width: 600px) {
    .summary { grid-template-columns: repeat(2, 1fr); }
    body { padding: 12px; }
  }
</style>
</head>

function getBadge(roas, spent) {
  if (!spent || spent < 5) return { cls:'zero', label:'Zero' };
  if (roas >= 1.0) return { cls:'winner', label:'Winner ✓' };
  if (roas >= 0.5) return { cls:'lemah', label:'Lemah' };
  if (roas > 0)    return { cls:'rugi',  label:'Rugi' };
  return { cls:'zero', label:'Zero' };
}

function getRoasColor(roas) {
  if (roas >= 1.0) return 'var(--green)';
  if (roas >= 0.5) return 'var(--amber)';
  if (roas > 0)    return 'var(--red)';
  return 'var(--muted)';
}

function encode(s) { return s.split('').map(c => c === ' ' ? '%20' : encodeURIComponent(c) === c ? c : encodeURIComponent(c)).join(''); }

function makeAdCard(ad) {
  const badge = getBadge(ad.roas, ad.spent);
  const roasColor = getRoasColor(ad.roas);
  const hookColor = ad.hook >= 20 ? 'var(--green)' : ad.hook >= 15 ? 'var(--amber)' : 'var(--red)';
  const ctrColor  = ad.ctr  >= 3.5 ? 'var(--green)' : ad.ctr  >= 2.5 ? 'var(--amber)' : 'var(--red)';
  const lpvColor  = ad.lpv  >= 20  ? 'var(--green)' : ad.lpv  >= 8   ? 'var(--amber)' : 'var(--red)';

  const videoHTML = ad.file
    ? `<video controls preload="metadata" playsinline>
         <source src="${encode(ad.file)}">
       </video>`
    : `<div class="video-placeholder">
         <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="3"/><polygon points="10 8 16 12 10 16"/></svg>
         <span>File tidak ada di folder</span>
       </div>`;

  const subtitle = ad.title ? ad.title : `Video ${ad.id.replace(/H\d+/,'').replace('V','')} · Hook ${ad.id.match(/H\d+/)[0]}`;

  const div = document.createElement('div');
  div.className = 'card';
  div.dataset.roas = ad.roas;
  div.dataset.spent = ad.spent;
  div.dataset.ctr = ad.ctr;
  div.dataset.hook = ad.hook;
  div.dataset.lpv = ad.lpv;
  div.dataset.badge = badge.cls;

  div.innerHTML = `
    <div class="video-wrap">
      ${videoHTML}
      <div class="badge-overlay"><span class="badge ${badge.cls}">${badge.label}</span></div>
      <div class="spend-overlay">RM${ad.spent.toLocaleString()}</div>
    </div>
    <div class="card-body">
      <div class="card-title">${ad.id}</div>
      <div class="card-subtitle">${subtitle}</div>
      <div class="metrics">
        <div class="metric-item">
          <div class="m-label">Hook Rate</div>
          <div class="m-val" style="color:${hookColor}">${ad.hook.toFixed(1)}%</div>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.min(ad.hook/35*100,100).toFixed(0)}%;background:${hookColor}"></div></div>
        </div>
        <div class="metric-item">
          <div class="m-label">CTR</div>
          <div class="m-val" style="color:${ctrColor}">${ad.ctr.toFixed(2)}%</div>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.min(ad.ctr/5*100,100).toFixed(0)}%;background:${ctrColor}"></div></div>
        </div>
        <div class="metric-item">
          <div class="m-label">LPV</div>
          <div class="m-val" style="color:${lpvColor}">${ad.lpv}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.min(ad.lpv/40*100,100).toFixed(0)}%;background:${lpvColor}"></div></div>
        </div>
        <div class="metric-item">
          <div class="m-label">CPLPV</div>
          <div class="m-val" style="color:var(--muted)">${ad.cplpv > 0 ? 'RM'+ad.cplpv.toFixed(0) : '—'}</div>
        </div>
        <div class="metric-item">
          <div class="m-label">Hasil</div>
          <div class="m-val">RM${ad.rev.toLocaleString()}</div>
        </div>
        <div class="metric-item">
          <div class="m-label">Donor</div>
          <div class="m-val">${ad.donors}</div>
        </div>
      </div>
      <div class="roas-row">
        <span class="roas-label">ROAS (Onpay)</span>
        <span class="roas-val" style="color:${roasColor}">${ad.roas > 0 ? ad.roas.toFixed(2)+'x' : '—'}</span>
      </div>
    </div>
  `;
  return div;
}

      <div class="card-subtitle" style="color:var(--muted);font-size:11px">Hook standalone · 4:5</div>

}

// Render kad dari data live
function renderAds(liveAds) {
  const grid = document.getElementById('ad-grid');
  grid.innerHTML = '';
  const sorted = [...liveAds].sort((a,b) => (b.roas_actual||0) - (a.roas_actual||0));
  sorted.forEach(liveAd => {
    // Cari static entry untuk file video
    const staticAd = ads.find(a => a.id === liveAd.ad_name) || {};
    const merged = {
      id:      liveAd.ad_name,
      title:   staticAd.title || '',
      file:    fileMap[liveAd.ad_name] || staticAd.file || null,
      hook:    (liveAd.hook_rate || 0) * 100,
      ctr:     liveAd.ctr || 0,
      lpv:     liveAd.lpv || 0,
      cplpv:   liveAd.cost_per_lpv || 0,
      spent:   liveAd.spend || 0,
      rev:     liveAd.total_revenue || 0,
      donors:  liveAd.donor_count || 0,
      roas:    liveAd.roas_actual || 0,
    };
    grid.appendChild(makeAdCard(merged));
  });
}

// Render static (fallback jika Worker belum setup)
function renderStatic() {
  const grid = document.getElementById('ad-grid');
  grid.innerHTML = '';
  const sorted = [...ads].sort((a,b) => b.roas - a.roas);
  sorted.forEach(ad => grid.appendChild(makeAdCard(ad)));
  document.getElementById('last-sync').textContent = 'Data statik (Worker belum disambung)';
}

  try {
    const res = await fetch(`${WORKER_URL}/api/metrics`);
    if (!res.ok) throw new Error('Worker tidak dapat dihubungi');
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);

    // Update summary
    const fmt = v => 'RM' + parseFloat(v).toLocaleString('ms-MY', {minimumFractionDigits:0, maximumFractionDigits:0});
    document.getElementById('s-spend').textContent = fmt(data.summary.total_spend);
    document.getElementById('s-rev').textContent   = fmt(data.summary.total_revenue);
    const roas = data.summary.overall_roas;
    const roasEl = document.getElementById('s-roas');
    roasEl.textContent = roas.toFixed(2) + 'x';
    roasEl.className = 'stat-val ' + (roas >= 1 ? 'good' : 'bad');
    document.getElementById('s-ads').textContent  = data.summary.total_ads;
    document.getElementById('s-win').textContent  = data.summary.winners;

    const syncTime = new Date(data.synced_at).toLocaleString('ms-MY');
    document.getElementById('last-sync').textContent = `Data live · Dikemas kini: ${syncTime}`;

    renderAds(data.ads);
  } catch (e) {
    console.warn('Live data gagal, guna data statik:', e.message);
    renderStatic();
  }
}

// Init
loadLiveData();

const hookGrid = document.getElementById('hook-grid');
hooks.forEach(h => hookGrid.appendChild(makeHookCard(h)));

// Sort
function sortCards(field) {
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  const cards = [...document.querySelectorAll('#ad-grid .card')];
  cards.sort((a,b) => parseFloat(b.dataset[field]||0) - parseFloat(a.dataset[field]||0));
  const grid = document.getElementById('ad-grid');
  cards.forEach(c => grid.appendChild(c));
}

// Filter
function filterCards(type) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.querySelectorAll('#ad-grid .card').forEach(c => {
    c.classList.toggle('hidden', type !== 'all' && c.dataset.badge !== type);
  });
}
</script>
